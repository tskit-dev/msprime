name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

permissions:
  contents: read

jobs:

  packaging:
    name: Python packaging
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v18
    with:
      additional-apt-packages: libgsl-dev
      cli-test-cmd: msp --help

  test-c:
    name: C tests
    uses: tskit-dev/.github/.github/workflows/c-tests.yml@v18
    with:
      additional-apt-packages: libgsl-dev
      library-directory: lib
    # Trusted first-party tskit-dev reusable workflow; needs secrets (e.g.
    # CODECOV_TOKEN) passed through.
    secrets: inherit  # zizmor: ignore[secrets-inherit]

  test-python-c:
    name: Python-C tests
    uses: tskit-dev/.github/.github/workflows/python-c-tests.yml@v18
    with:
      additional-apt-packages: libgsl-dev
    # Trusted first-party tskit-dev reusable workflow; needs secrets (e.g.
    # CODECOV_TOKEN) passed through.
    secrets: inherit  # zizmor: ignore[secrets-inherit]

  test-python:
    name: Python
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: [ 3.11, 3.14 ]
        os:  [ macos-latest, ubuntu-24.04, windows-latest ]
    defaults:
      run:
        shell: bash

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66  # 0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Fix windows symlinks
        # This is horrible, but the "git config core.symlinks true" didn't work.
        if: matrix.os == 'windows-latest'
        run: |
          rm lwt_interface
          cp -r --dereference git-submodules/tskit/python/lwt_interface ./lwt_interface

      - name: Install GSL (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install gsl

      - name: Install GSL (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install gsl:x64-windows
          # Add GSL DLL directory to PATH for runtime
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
          $gslBinPath = Join-Path $vcpkgRoot "installed\x64-windows\bin"
          echo "$gslBinPath" >> $env:GITHUB_PATH
          Write-Output "Added to PATH: $gslBinPath"
        shell: powershell

      - name: Install GSL (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get update && sudo apt-get install -y libgsl-dev

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python }}
          version: "0.10.0"

      - name: Install Python dependencies
        run: uv sync --locked --group test --no-default-groups

      - name: Build module
        run: uv run --locked --no-default-groups python setup.py build_ext --inplace

      - name: Fix windows gsl dlls
        if: matrix.os == 'windows-latest'
        run: cp /c/vcpkg/installed/x64-windows/bin/gsl*.dll msprime/

      - name: Run tests
        run: |
           uv run --locked --no-default-groups pytest --cov=msprime \
            --cov-report=xml --cov-branch -n2

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: python-tests
          files: coverage.xml
          disable_search: true
          verbose: true
